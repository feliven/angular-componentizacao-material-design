<app-card [estiloCard]="'primary'">
  <mat-card appearance="outlined">
    <img mat-card-image [src]="enderecoFoto()" />
    <mat-card-content>
      <p>
        {{ nomeLocal() }}
      </p>
      <p>R$ 500</p>
    </mat-card-content>
    <mat-card-actions>
      <button matFab extended>Ver detalhes</button>
    </mat-card-actions>
  </mat-card>
</app-card>
