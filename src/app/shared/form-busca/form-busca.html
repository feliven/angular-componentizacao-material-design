<app-card [estiloCard]="'tertiary'">
  <form class="form-busca" [formGroup]="tipoPassagem">
    <div class="linha-superior">
      <mat-button-toggle-group [formControl]="tipoPassagem.controls.somenteIdaControl">
        <mat-button-toggle value="idaVolta">Ida e volta</mat-button-toggle>
        <mat-button-toggle value="somenteIda">Só volta</mat-button-toggle>
      </mat-button-toggle-group>
      <mat-chip-listbox multiple>
        <mat-chip-option selected>1 adulto</mat-chip-option>
        <mat-chip-option selected>Econômica</mat-chip-option>
      </mat-chip-listbox>
    </div>
    <div class="linha-inferior">
      <div class="origem-destino">
        <mat-form-field appearance="outline">
          <mat-label>Origem</mat-label>
          <mat-icon matPrefix>plane_contrails</mat-icon>
          <input matInput />
          <button matIconButton matSuffix>
            <mat-icon>travel_explore</mat-icon>
          </button>
        </mat-form-field>

        <button matMiniFab class="botao-switch">
          <mat-icon>arrows_left_right_circle</mat-icon>
        </button>

        <mat-form-field appearance="outline">
          <mat-label>Destino</mat-label>
          <mat-icon matPrefix>flight</mat-icon>
          <input matInput />
          <button matIconButton matSuffix>
            <mat-icon>travel_explore</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <div class="datas-e-botao-buscar">
        <mat-form-field appearance="outline">
          <mat-label>Data de ida</mat-label>
          <input matInput [matDatepicker]="idaPicker" placeholder="Selecione" />
          <mat-hint>MM/DD/YYYY</mat-hint>
          <mat-datepicker-toggle matIconSuffix [for]="idaPicker"></mat-datepicker-toggle>
          <mat-datepicker #idaPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Data de volta</mat-label>
          <input matInput [matDatepicker]="voltaPicker" placeholder="Selecione" />
          <mat-hint>MM/DD/YYYY</mat-hint>
          <mat-datepicker-toggle matIconSuffix [for]="voltaPicker"></mat-datepicker-toggle>
          <mat-datepicker #voltaPicker></mat-datepicker>
        </mat-form-field>

        <button matButton="filled" class="botao-buscar">Buscar</button>
      </div>
    </div>
  </form>
</app-card>
